services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
        POSTGRES_USER: uptime_user
        POSTGRES_PASSWORD: uptime_password
        POSTGRES_DB: uptime_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime_user -d uptime_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgres://uptime_user:uptime_password@db:5432/uptime_db?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
volumes:
    postgres_data: