services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
        POSTGRES_USER: uptime_user
        POSTGRES_PASSWORD: uptime_password
        POSTGRES_DB: uptime_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime_user -d uptime_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://uptime_user:uptime_password@db:5432/uptime_db?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    volumes:
      # Allow Promtail to talk to Docker and read the container log files
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./api.localhost+1.pem:/etc/caddy/certs/cert.pem:ro
      - ./api.localhost+1-key.pem:/etc/caddy/certs/key.pem:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - grafana

volumes:
    postgres_data:
    caddy_data:
    caddy_config:
    grafana_data:
    prometheus_data:
    loki_data:
