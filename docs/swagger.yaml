basePath: /
definitions:
  domain.Monitor:
    properties:
      check_interval:
        description: interval in seconds
        type: integer
      created_at:
        type: string
      expected_keyword:
        type: string
      id:
        type: integer
      updated_at:
        type: string
      url:
        type: string
    type: object
  domain.MonitorStats:
    properties:
      avg_latency_ms:
        type: number
      p95_latency_ms:
        type: number
      total_pings:
        type: integer
      uptime_percentage:
        type: number
    type: object
  domain.Role:
    enum:
    - admin
    - viewer
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleViewer
  handlers.CreateRequest:
    properties:
      check_interval:
        example: 60
        type: integer
      expected_keyword:
        example: Welcome
        type: string
      url:
        example: https://google.com
        type: string
    type: object
  handlers.CreateResponse:
    properties:
      check_interval:
        example: 60
        type: integer
      created_at:
        example: "2025-01-01T12:00:00Z"
        type: string
      monitor_id:
        example: 1
        type: integer
      updated_at:
        example: "2025-01-01T12:00:00Z"
        type: string
      url:
        example: https://google.com
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handlers.LoginResponse:
    properties:
      token:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    type: object
  handlers.UpdateRequest:
    properties:
      check_interval:
        example: 60
        type: integer
      expected_keyword:
        example: Welcome
        type: string
      url:
        example: https://google.com
        type: string
    type: object
  response.ErrorResponse:
    properties:
      message:
        type: string
      status:
        type: integer
    type: object
  response.SuccessResponse:
    properties:
      data: {}
      message:
        type: string
    type: object
host: api.localhost
info:
  contact: {}
  description: A simple uptime monitoring service API based on Clean Architecture
  title: Uptime Monitor API
  version: "1.0"
paths:
  /healthz:
    get:
      description: Check if the application process is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: Liveness Probe
      tags:
      - Operations
  /login:
    post:
      consumes:
      - application/json
      description: Logs in a user with their email and password, and returns a JWT
        token with their assigned RBAC role.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successful login with JWT token
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Invalid JSON payload
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: User Login
      tags:
      - Auth
  /monitors:
    get:
      description: Retrieve a list of all monitors currently being tracked.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Monitor'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List Monitors
      tags:
      - Monitors
    post:
      consumes:
      - application/json
      description: Add a new URL to the uptime monitoring system with optional HTML
        keyword validation and a custom checking interval.
      parameters:
      - description: Monitor configuration parameters including target URL, search
          keyword, and interval in seconds.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created monitor record
          schema:
            $ref: '#/definitions/handlers.CreateResponse'
        "400":
          description: Invalid JSON payload or missing URL
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized access, requires Admin or Viewer role JWT
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Monitor
      tags:
      - Monitors
  /monitors/{id}:
    delete:
      consumes:
      - application/json
      description: Remove a monitor using its unique ID.
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Monitor'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete Monitor
      tags:
      - Monitors
    get:
      description: Retrieve details of a specific monitor using its unique ID.
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Monitor'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Monitor by ID
      tags:
      - Monitors
    put:
      consumes:
      - application/json
      description: Overwrite the URL, keyword, or check interval of an existing monitor.
        Check interval defaults to 60 seconds if less than 10.
      parameters:
      - description: Unique ID of the monitor to update
        in: path
        name: id
        required: true
        type: integer
      - description: New values for monitor
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated monitor details
          schema:
            $ref: '#/definitions/domain.Monitor'
        "400":
          description: Malformatted request or ID
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized access
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Monitor not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Monitor
      tags:
      - Monitors
  /monitors/{id}/stats:
    get:
      description: Retrieve stats for a monitored URL using its unique ID.
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MonitorStats'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Fetch Monitor Stats
      tags:
      - Monitors
  /readyz:
    get:
      description: Check if the application is fully ready to accept traffic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Readiness Probe
      tags:
      - Operations
  /register:
    post:
      consumes:
      - application/json
      description: Creates a new admin or viewer. Must be authenticated with an Admin
        JWT.
      parameters:
      - description: User Registration Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created user
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid JSON, duplicate email, or invalid role
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden - requires Admin role
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new user
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by your JWT Token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
